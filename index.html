<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمد شیرکوند | کارشناس حقوقی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/shabnam-font@v5.0.1/dist/font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            font-family: 'Shabnam', 'Vazirmatn', Tahoma, sans-serif;
            background: #000;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FFD700;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .profile-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow:
                0 50px 100px -20px rgba(0,0,0,0.95),
                0 0 0 1px rgba(255,215,0,0.15),
                0 0 60px rgba(255,215,0,0.06);
        }

        .card-inner {
            background: linear-gradient(160deg,
                #0d1b2a 0%,
                #0a1628 50%,
                #0d1b2a 100%
            );
            padding: 0;
        }

        .top-stripe {
            height: 4px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,215,0,0.3) 20%,
                #FFD700 40%,
                #FFF0A0 50%,
                #FFD700 60%,
                rgba(255,215,0,0.3) 80%,
                transparent 100%
            );
        }

        .profile-header {
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 1.5rem;
        }

        .avatar-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                rgba(255,215,0,0.6) 80deg,
                #FFD700 140deg,
                #FFF0A0 200deg,
                #FFD700 260deg,
                rgba(255,215,0,0.6) 320deg,
                transparent 360deg
            );
            animation: spinGlow 5s linear infinite;
            opacity: 0.6;
        }

        .avatar-glow::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: #0d1b2a;
        }

        @keyframes spinGlow {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .avatar {
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            border: 2px solid rgba(255,215,0,0.25);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFF4C1 50%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.9rem;
        }

        .job-title {
            font-size: 1.15rem;
            color: rgba(220,225,245,0.85);
            margin-bottom: 0.5rem;
        }

        .organization {
            font-size: 1.05rem;
            color: rgba(200,210,240,0.7);
        }

        .separator {
            height: 1px;
            margin: 2rem 2rem 1.8rem;
            background: linear-gradient(90deg,
                transparent,
                rgba(255,215,0,0.15) 30%,
                rgba(255,215,0,0.25) 50%,
                rgba(255,215,0,0.15) 70%,
                transparent
            );
        }

        .profile-body {
            padding: 0 2rem 2.5rem;
        }

        .contact-block {
            margin-bottom: 1.8rem;
        }

        .contact-row {
            display: flex;
            align-items: center;
            flex-direction: row-reverse;
            gap: 1rem;
            padding: 0.9rem 1.2rem;
            border-radius: 1rem;
            margin-bottom: 0.7rem;
            transition: all 0.3s ease;
        }

        .contact-row:hover {
            transform: translateX(4px);
        }

        .contact-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.04));
            border: 1px solid rgba(255,215,0,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #FFD700;
            font-size: 1.15rem;
        }

        .contact-content {
            flex: 1;
            text-align: right;
        }

        .contact-content a {
            display: block;
            color: #e8ecf8;
            text-decoration: none;
            font-size: 1.05rem;
            transition: color 0.2s;
            line-height: 1.7;
            direction: ltr;
            text-align: right;
        }

        .contact-content a:hover {
            color: #FFD700;
        }

        /* ─── Channels Section ─── */
        .channels-section {
            margin-bottom: 1.8rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255,215,0,0.75);
            text-align: center;
            margin-bottom: 1.1rem;
            letter-spacing: 0.02em;
        }

        .channels-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .channel-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .channel-icon-wrap {
            width: 62px;
            height: 62px;
            border-radius: 18px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,215,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            color: rgba(255,215,0,0.75);
            transition: all 0.3s ease;
        }

        .channel-link:hover .channel-icon-wrap {
            border-color: rgba(255,215,0,0.55);
            color: #FFD700;
            transform: translateY(-5px);
            box-shadow: 0 14px 28px rgba(255,215,0,0.15);
            background: rgba(255,215,0,0.06);
        }

        .channel-label {
            font-size: 0.8rem;
            color: rgba(200,215,245,0.6);
            transition: color 0.3s;
        }

        .channel-link:hover .channel-label {
            color: rgba(255,215,0,0.85);
        }

        /* Bale icon text */
        .bale-text-icon {
            font-family: 'Shabnam', 'Vazirmatn', Tahoma, sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1;
        }

        /* ─── Address Section ─── */
        .address-section {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,215,0,0.1);
            border-radius: 1.4rem;
            padding: 1.4rem 1.2rem;
        }

        .address-label {
            font-size: 0.9rem;
            color: rgba(255,215,0,0.6);
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.4rem;
        }

        .address-text {
            font-size: 1rem;
            color: rgba(220,230,250,0.85);
            text-align: center;
            margin-bottom: 1.2rem;
            line-height: 1.7;
        }

        .address-icons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .address-icon-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.45rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .address-icon-box {
            width: 58px;
            height: 58px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,215,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,215,0,0.7);
            transition: all 0.3s ease;
        }

        /* Google Maps: red */
        .address-icon-link.gmaps .address-icon-box {
            color: #ea4335;
            border-color: rgba(234,67,53,0.2);
        }
        .address-icon-link.gmaps:hover .address-icon-box {
            background: rgba(234,67,53,0.08);
            border-color: rgba(234,67,53,0.5);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(234,67,53,0.2);
        }

        /* Waze: cyan */
        .address-icon-link.waze .address-icon-box {
            color: #33ccff;
            border-color: rgba(51,204,255,0.2);
        }
        .address-icon-link.waze:hover .address-icon-box {
            background: rgba(51,204,255,0.06);
            border-color: rgba(51,204,255,0.5);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(51,204,255,0.15);
        }

        /* Bale: gold */
        .address-icon-link.bale .address-icon-box {
            color: rgba(255,215,0,0.75);
        }
        .address-icon-link.bale:hover .address-icon-box {
            background: rgba(255,215,0,0.06);
            border-color: rgba(255,215,0,0.5);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255,215,0,0.15);
        }

        /* Balad: green */
        .address-icon-link.balad .address-icon-box {
            color: #00c853;
            border-color: rgba(0,200,83,0.2);
        }
        .address-icon-link.balad:hover .address-icon-box {
            background: rgba(0,200,83,0.06);
            border-color: rgba(0,200,83,0.5);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,200,83,0.15);
        }

        /* Neshan: purple */
        .address-icon-link.neshan .address-icon-box {
            color: #9c27b0;
            border-color: rgba(156,39,176,0.2);
        }
        .address-icon-link.neshan:hover .address-icon-box {
            background: rgba(156,39,176,0.06);
            border-color: rgba(156,39,176,0.5);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(156,39,176,0.15);
        }

        .address-icon-link:hover .address-icon-label {
            color: rgba(255,215,0,0.85);
        }

        .address-icon-label {
            font-size: 0.72rem;
            color: rgba(200,215,245,0.55);
            transition: color 0.3s;
        }

        /* Waze icon override via FA */
        .fa-waze { color: inherit; }

        .bottom-stripe {
            height: 3px;
            margin-top: 2rem;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,215,0,0.25) 25%,
                rgba(255,215,0,0.5) 50%,
                rgba(255,215,0,0.25) 75%,
                transparent 100%
            );
        }

        @media (max-width: 500px) {
            .profile-header { padding: 2.5rem 1.5rem 1.8rem; }
            .avatar-container { width: 130px; height: 130px; }
            .name { font-size: 1.9rem; }
            .profile-body { padding: 0 1.5rem 2rem; }
            .channel-icon-wrap { width: 54px; height: 54px; font-size: 1.5rem; }
            .address-icon-box { width: 52px; height: 52px; font-size: 1.35rem; }
            .address-icons { gap: 0.6rem; }
        }
    </style>
</head>
